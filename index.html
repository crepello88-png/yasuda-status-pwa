<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#07090f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yasuda Status">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css">
<title>Yasuda Status</title>
</head>
<body>
<header>
  <span id="dot" class="dot unk"></span>
  <span class="brand">Yasuda Status</span>
  <span class="ro-badge">READ-ONLY</span>
  <span class="spacer"></span>
  <span class="upd" id="upd">—</span>
  <button id="refresh" aria-label="更新">↻</button>
</header>

<div class="tabs-wrap">
  <div class="tabs" id="tabs">
    <div class="tab-indicator" id="tab-ind"></div>
  </div>
</div>

<main id="main"></main>

<footer>
  100% read-only · 発注 / 停止操作はこの画面からできません<br>
  緊急停止は home PC の <code>disable_all.bat</code>
</footer>

<div id="offline">⚠ オフライン — 最後に取得した snapshot を表示中</div>

<script src="app.js"></script>
</body>
</html>
